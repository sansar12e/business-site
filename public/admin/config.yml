backend:
  name: github
  repo: sansar12e/business-site
  branch: main
  auth_endpoint: api/auth

media_folder: public/uploads
public_path: /uploads

collections:
  - name: site
    label: Site Settings
    file: src/config.json
    format: json
    fields:
      - label: Website
        name: site
        widget: object
        fields:
          - { label: Business Name, name: name, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Description, name: description, widget: string }
          - { label: Website URL, name: url, widget: string }
          - { label: Author, name: author, widget: string }

      - label: Contact Information
        name: contact
        widget: object
        fields:
          - { label: Email, name: email, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: LinkedIn Profile, name: linkedin, widget: string }
          - { label: Twitter Profile, name: twitter, widget: string }
          - { label: Formspree ID, name: formspreeId, widget: string, hint: "Get from https://formspree.io" }

      - label: Colors
        name: colors
        widget: object
        fields:
          - { label: Background Color, name: bg, widget: color, enableAlpha: false }
          - { label: Surface Color, name: surface, widget: color, enableAlpha: false }
          - { label: Secondary Surface, name: surface2, widget: color, enableAlpha: false }
          - { label: Text Color, name: text, widget: color, enableAlpha: false }
          - { label: Muted Text, name: muted, widget: color, enableAlpha: false }
          - { label: Accent Color, name: accent, widget: color, enableAlpha: false }
          - { label: Accent Dark, name: accentDark, widget: color, enableAlpha: false }
          - { label: Border Color, name: border, widget: color, enableAlpha: false }
          - { label: Shadow Effect, name: shadow, widget: string }

      - label: Typography
        name: typography
        widget: object
        fields:
          - { label: Font Family, name: fontFamily, widget: string }
          - { label: Line Height, name: lineHeight, widget: string }

      - label: Hero Section
        name: hero
        widget: object
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Subtitle, name: subtitle, widget: string }
          - { label: CTA Button Text, name: ctaText, widget: string }
          - { label: CTA Button Link, name: ctaLink, widget: string }

      - label: Services
        name: services
        widget: list
        fields:
          - { label: ID, name: id, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string }
          - { label: Icon, name: icon, widget: string, hint: "Use emoji or Unicode" }
          - { label: Benefits, name: benefits, widget: list, field: { label: Benefit, name: benefit, widget: string } }

      - label: Testimonials
        name: testimonials
        widget: list
        fields:
          - { label: Quote, name: quote, widget: text }
          - { label: Author Name, name: author, widget: string }
          - { label: Company, name: company, widget: string }
          - { label: Image, name: image, widget: image }

      - label: FAQ
        name: faq
        widget: list
        fields:
          - { label: Question, name: question, widget: string }
          - { label: Answer, name: answer, widget: text }

      - label: About Section
        name: about
        widget: object
        fields:
          - { label: Intro, name: intro, widget: string }
          - { label: Mission, name: mission, widget: string }
          - { label: Experience, name: experience, widget: string }
          - label: Values
            name: values
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: string }

      - label: Social Links
        name: social
        widget: object
        fields:
          - { label: LinkedIn, name: linkedin, widget: string }
          - { label: Twitter, name: twitter, widget: string }
          - { label: GitHub, name: github, widget: string }
          - { label: Email, name: email, widget: string }
