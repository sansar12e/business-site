backend:
  name: github
  repo: sansar12e/business-site
  branch: main
  base_url: https://business-site-an6.pages.dev
  auth_endpoint: api/auth

media_folder: public/uploads
public_path: /uploads

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: [pubDate, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Short Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: Category, name: category, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Reading Time, name: readingTime, widget: string, required: false, hint: "e.g. 6 min read" }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: site
    label: Site Settings
    files:
      - name: settings
        label: General Settings
        file: src/config.json
        format: json
        fields:
          - label: Website
            name: site
            widget: object
            fields:
              - { label: Business Name, name: name, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Description, name: description, widget: string }
              - { label: Website URL, name: url, widget: string }
              - { label: Author, name: author, widget: string }

          - label: Contact Information
            name: contact
            widget: object
            fields:
              - { label: Email, name: email, widget: string }
              - { label: Phone, name: phone, widget: string }
              - { label: LinkedIn Profile, name: linkedin, widget: string }
              - { label: Twitter Profile, name: twitter, widget: string }
              - label: Formspree ID
                name: formspreeId
                widget: string
                hint: "Get this from formspree.io"

          - label: Colors
            name: colors
            widget: object
            fields:
              - { label: Background Color, name: bg, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Surface Color, name: surface, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Secondary Surface, name: surface2, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Text Color, name: text, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Muted Text, name: muted, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Accent Color, name: accent, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Accent Dark, name: accentDark, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Border Color, name: border, widget: string, hint: "Hex colour, e.g. #2563eb", pattern: ["^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$", "Must be a hex colour such as #2563eb"] }
              - { label: Shadow Effect, name: shadow, widget: string }

          - label: Typography
            name: typography
            widget: object
            fields:
              - { label: Font Family, name: fontFamily, widget: string }
              - { label: Display Font, name: fontDisplay, widget: string }
              - { label: Line Height, name: lineHeight, widget: string }

          - label: Hero Section
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: CTA Button Text, name: ctaText, widget: string }
              - { label: CTA Button Link, name: ctaLink, widget: string }

          - label: Services
            name: services
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: string, hint: "One short line shown on the home page" }
              - { label: Description, name: description, widget: text, hint: "2–3 sentences: what it is and why it matters" }
              - { label: Who it's for, name: forWhom, widget: string }
              - { label: Price Summary, name: priceSummary, widget: string, hint: "Short price shown on the home page, e.g. From $250" }
              - label: Pricing
                name: pricing
                widget: list
                fields:
                  - { label: Label, name: label, widget: string, required: false, hint: "e.g. Build, Maintenance — leave blank for a single price" }
                  - { label: Amount, name: value, widget: string }
                  - { label: Free for first clients, name: free, widget: boolean, default: false, required: false }

          - label: Guarantees
            name: guarantees
            widget: list
            field: { label: Guarantee, name: guarantee, widget: string }

          - label: FAQ
            name: faq
            widget: list
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

          - label: About Section
            name: about
            widget: object
            fields:
              - { label: Intro, name: intro, widget: string }
              - { label: Mission, name: mission, widget: string }
              - { label: Experience, name: experience, widget: string }
              - label: Values
                name: values
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: string }

          - label: Social Links
            name: social
            widget: object
            fields:
              - { label: LinkedIn, name: linkedin, widget: string }
              - { label: Twitter, name: twitter, widget: string }
              - { label: GitHub, name: github, widget: string }
              - { label: Email, name: email, widget: string }